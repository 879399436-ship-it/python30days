  const el = document.getElementById('weekTabs');
  el.innerHTML = weeks.map((w,i) => `
    <button class="tab ${currentWeek===i+1?'active':''}" onclick="selectWeek(${i+1})">
      ${w.emoji} ${w.label}·${w.subtitle}
    </button>
  `).join('');
}

function renderProgress() {
  const fill = document.getElementById('progressFill');
  const weekDays = days.filter(d=>d.week===currentWeek);
  fill.style.width = (currentWeek/4*100)+'%';
  fill.style.background = getWeekColor(currentWeek);
}

function renderGrid() {
  const el = document.getElementById('daysGrid');
  const weekDays = days.filter(d=>d.week===currentWeek);
  el.innerHTML = weekDays.map(d => {
    const sel = selectedDay === d.day;
    return `<div class="day-card ${sel?'selected':''}" onclick="selectDay(${d.day})" style="${sel?'border-color:'+getWeekColor(d.week)+';':''} ">
      <div class="day-num" style="color:${getWeekColor(d.week)}">第 ${d.day} 天</div>
      <div class="day-title">${d.emoji} ${d.title}</div>
      <span class="day-tag" style="background:${getWeekBg(d.week)};color:${getWeekColor(d.week)}">${weeks[d.week-1].subtitle}</span>
    </div>`;
  }).join('');
}

function renderDetail() {
  const d = days.find(x=>x.day===selectedDay);
  if(!d) return;
  const color = getWeekColor(d.week);
  const bg = getWeekBg(d.week);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:${bg};font-size:22px;">${d.emoji}</div>
      <div class="detail-meta">
        <h2>第 ${d.day} 天：${d.title}</h2>
        <p>${weeks[d.week-1].label} · ${weeks[d.week-1].subtitle} · 预计 30 分钟</p>
      </div>
    </div>
    <div class="sections">
      <div class="section">
        <div class="section-title">今日学习内容</div>
        <ul>${d.learn.map(l=>`<li>${l}</li>`).join('')}</ul>
      </div>
      <div class="section">
        <div class="section-title">动手练习</div>
        <ul>${d.practice.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="project-box">
      <div class="proj-label">实际场景项目</div>
      <div class="proj-text">${d.project}</div>
    </div>
    <div class="tip-box">
      <div class="tip-label">今日小贴士</div>
      <div class="tip-text">${d.tip}</div>
    </div>
    <button class="ask-btn" onclick="sendPrompt('我在学Python第${d.day}天：${d.title}，请给我这个主题的详细讲解和代码示例')">请Claude详细讲解这个主题 ↗</button>
  `;
}

function selectWeek(w) {
  currentWeek = w;
  selectedDay = days.find(d=>d.week===w)?.day || 1;
  renderTabs(); renderProgress(); renderGrid(); renderDetail();
}

function selectDay(d) {
  selectedDay = d;
  renderGrid(); renderDetail();
}

renderTabs(); renderProgress(); renderGrid(); renderDetail();
</script>
